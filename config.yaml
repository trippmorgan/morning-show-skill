# Morning Show Production Configuration

# --- Voice synthesis (ElevenLabs) ---
voice:
  id: ZnX1f6YZpySUHtk0RDLM
  model: eleven_multilingual_v2
  stability: 0.5
  similarity_boost: 0.85
  style: 0.35
  format: mp3_44100_128

# --- Station / playout system ---
station:
  host: p1-wpfq-srvs
  audio_path: 'F:\PlayoutONE\Audio'
  temp_path: 'C:\temp'
  db: PlayoutONE_Standard
  sql_server: 'localhost\p1sqlexpress'
  sql_user: REDACTED_USER
  sql_pass: 'PlayoutONE.'
  # DPL import folder — AutoImporter watches this (NOT C:\PlayoutONE\data\playlists\)
  dpl_import_path: 'F:\PlayoutONE\Import\Music Logs'
  dpl_imported_path: 'F:\PlayoutONE\Import\Music Logs\Imported'
  # ffmpeg on station for remote segmentation
  ffmpeg_path: 'C:\PlayoutONE\Modules\ffmpeg.exe'

# --- Audio processing ---
audio:
  sample_rate: 44100
  channels: 2
  bitrate: 192k
  lufs: -16
  true_peak: -1.5
  preview_bitrate: 128k
  format: mp3
  ffmpeg_filter: 'loudnorm=I=-16:TP=-1.5:LRA=11'
  # Segment settings (avoid Extro=0 on large files)
  max_segment_minutes: 10
  segment_crossfade_ms: 5000

# --- Show schedule ---
show:
  hours: [5, 6, 7, 8]
  days:
    - monday
    - tuesday
    - wednesday
    - thursday
    - friday
  persona: dr-johnny-fever
  timezone: America/New_York

# --- Publish safety ---
publish:
  # Method: dpl (safe) or sql (DEPRECATED — causes crashes)
  method: dpl
  # Minimum minutes before target hour to allow publish
  min_lead_time_minutes: 30
  # DPL format: music1 (14-column) — matches Music1 output exactly
  dpl_format: music1
  # Audio table markers
  extro_offset_ms: 5000
  # UID scheme: 901{hour}{segment} (e.g., 90151 = hour 5, segment 1)
  uid_prefix: '901'

# --- Delivery / notifications ---
delivery:
  telegram_target: "8048875001"
  max_file_mb: 50

# --- ElevenLabs API ---
elevenlabs:
  api_key_env: ELEVENLABS_API_KEY
  api_key_file: '~/.env'
  rate_limit_sleep: 1
